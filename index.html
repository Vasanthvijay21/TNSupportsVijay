<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>People Support for Vijay</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Noto Sans Tamil',sans-serif;
    }

    body{
      background:#000;
      color:#fff;
      overflow-x:hidden;
      min-height:100vh;
      background:
        radial-gradient(circle at top,#7f0000 0%,#000 60%);
    }

    .container{
      width:100%;
      max-width:1200px;
      margin:auto;
      padding:20px;
    }

    .hero{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      position:relative;
      overflow:hidden;
    }

    .hero::before{
      content:'';
      position:absolute;
      width:700px;
      height:700px;
      background:rgba(255,215,0,0.08);
      border-radius:50%;
      filter:blur(100px);
      top:-200px;
    }

    h1{
      font-size:clamp(2.5rem,6vw,5rem);
      color:#ffd700;
      font-weight:900;
      z-index:2;
    }

    .subtitle{
      margin-top:20px;
      max-width:800px;
      line-height:1.7;
      color:#ddd;
      z-index:2;
      font-size:1.1rem;
    }

    .card{
      margin-top:40px;
      width:100%;
      max-width:700px;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,215,0,0.2);
      backdrop-filter:blur(14px);
      padding:30px;
      border-radius:30px;
      z-index:2;
      box-shadow:0 0 40px rgba(0,0,0,0.5);
    }

    .input-group{
      margin-bottom:20px;
    }

    input{
      width:100%;
      padding:16px;
      border:none;
      border-radius:16px;
      font-size:1rem;
      outline:none;
    }

    button{
      background:#ffd700;
      color:#000;
      border:none;
      padding:16px 35px;
      border-radius:50px;
      font-size:1rem;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      transform:scale(1.05);
    }

    .preview{
      margin-top:40px;
      text-align:center;
    }

    .preview img{
      width:100%;
      max-width:400px;
      border-radius:30px;
      border:3px solid #ffd700;
      box-shadow:0 0 30px rgba(255,215,0,0.3);
    }

    .download-btn{
      display:inline-block;
      margin-top:20px;
      text-decoration:none;
      background:#ff0000;
      color:#fff;
      padding:14px 30px;
      border-radius:50px;
      font-weight:bold;
    }

    .toggle{
      position:fixed;
      top:20px;
      right:20px;
      z-index:100;
    }

    .counter{
      margin-top:20px;
      color:#ffd700;
      font-size:2rem;
      font-weight:900;
    }

    .disclaimer{
      margin-top:20px;
      font-size:0.9rem;
      opacity:0.7;
      line-height:1.6;
    }

    canvas{
      display:none;
    }

    @media(max-width:768px){
      .card{
        padding:20px;
      }
    }
  </style>
</head>
<body>

<div class="toggle">
  <button onclick="toggleLanguage()">தமிழ் / English</button>
</div>

<section class="hero">

  <div class="container">

    <h1 id="title">
      தமிழக மக்களின் ஆதரவு
    </h1>

    <p class="subtitle" id="subtitle">
      அமைதியான ஜனநாயக குடிமக்கள் ஆதரவு தளம்
    </p>

    <div class="counter" id="counter">
      12,000+
    </div>

    <div class="card">

      <div class="input-group">
        <input type="text" id="name" placeholder="உங்கள் பெயர்">
      </div>

      <div class="input-group">
        <input type="text" id="constituency" placeholder="தொகுதி பெயர்">
      </div>

      <button onclick="generatePoster()" id="generateBtn">
        போஸ்டர் உருவாக்கு
      </button>

      <div class="disclaimer">
        This is an independent citizen opinion platform created for peaceful democratic expression under Article 19(1)(a) of the Constitution of India.
      </div>

      <canvas id="posterCanvas"></canvas>

      <div class="preview" id="preview"></div>

    </div>

  </div>

</section>

<script>

let currentLanguage = 'ta'

function toggleLanguage(){

  currentLanguage = currentLanguage === 'ta' ? 'en' : 'ta'

  if(currentLanguage === 'ta'){

    document.getElementById('title').innerText =
      'தமிழக மக்களின் ஆதரவு'

    document.getElementById('subtitle').innerText =
      'அமைதியான ஜனநாயக குடிமக்கள் ஆதரவு தளம்'

    document.getElementById('name').placeholder =
      'உங்கள் பெயர்'

    document.getElementById('constituency').placeholder =
      'தொகுதி பெயர்'

    document.getElementById('generateBtn').innerText =
      'போஸ்டர் உருவாக்கு'

  }else{

    document.getElementById('title').innerText =
      'People Support for Vijay'

    document.getElementById('subtitle').innerText =
      'Peaceful Democratic Citizen Support Platform'

    document.getElementById('name').placeholder =
      'Your Name'

    document.getElementById('constituency').placeholder =
      'Constituency'

    document.getElementById('generateBtn').innerText =
      'Generate Poster'
  }
}

function generatePoster(){

  const name =
    document.getElementById('name').value

  const constituency =
    document.getElementById('constituency').value

  if(!name || !constituency){
    alert(
      currentLanguage === 'ta'
      ? 'அனைத்து விவரங்களையும் உள்ளிடவும்'
      : 'Please fill all details'
    )
    return
  }

  const canvas =
    document.getElementById('posterCanvas')

  const ctx =
    canvas.getContext('2d')

  canvas.width = 1080
  canvas.height = 1350

  const gradient =
    ctx.createLinearGradient(0,0,0,1350)

  gradient.addColorStop(0,'#000000')
  gradient.addColorStop(1,'#7f0000')

  ctx.fillStyle = gradient
  ctx.fillRect(0,0,1080,1350)

  ctx.fillStyle = '#ffd700'
  ctx.font = 'bold 70px Noto Sans Tamil'
  ctx.textAlign = 'center'

  ctx.fillText(
    currentLanguage === 'ta'
    ? 'தமிழக மக்களின் ஆதரவு'
    : 'People Support for Vijay',
    540,
    150
  )

  ctx.fillStyle = '#ffffff'
  ctx.font = 'bold 90px Noto Sans Tamil'

  ctx.fillText(name,540,500)

  ctx.font = '55px Noto Sans Tamil'

  ctx.fillText(constituency,540,620)

  ctx.fillStyle = '#ffd700'
  ctx.font = 'bold 65px Noto Sans Tamil'

  ctx.fillText(
    currentLanguage === 'ta'
    ? 'விஜய்க்கு ஆதரவு'
    : 'Support Vijay',
    540,
    850
  )

  ctx.fillStyle = '#ffffff'
  ctx.font = '35px Noto Sans Tamil'

  ctx.fillText(
    'Independent Citizen Democratic Support Platform',
    540,
    1180
  )

  ctx.font = '28px Noto Sans Tamil'

  ctx.fillText(
    'Peaceful democratic expression under Article 19(1)(a)',
    540,
    1230
  )

  const image =
    canvas.toDataURL('image/png')

  document.getElementById('preview').innerHTML = `
    <img src="${image}" />

    <br>

    <a
      class="download-btn"
      href="${image}"
      download="vijay-support-poster.png"
    >
      ${
        currentLanguage === 'ta'
        ? 'பதிவிறக்கம் செய்யவும்'
        : 'Download Poster'
      }
    </a>
  `
}

setInterval(()=>{

  let current =
    parseInt(
      localStorage.getItem('supportCount') || '12000'
    )

  current += Math.floor(Math.random()*3)

  localStorage.setItem('supportCount',current)

  document.getElementById('counter').innerText =
    current.toLocaleString() + '+'

},3000)

</script>

</body>
</html>
